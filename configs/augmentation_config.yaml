augmentation:
  enabled: true
  apply_prob: 0.5           # probability that any augmentation is applied per sample

  # --- time/frequency masking (SpecAugment) ---
  spec_augment:
    enabled: true
    time_mask_param: 80     # max frames to mask
    freq_mask_param: 20     # max mel bins to mask
    num_time_masks: 2
    num_freq_masks: 2

  # --- gain jitter ---
  gain:
    enabled: true
    min_gain_db: -6.0
    max_gain_db: 6.0

  # --- additive gaussian noise ---
  noise:
    enabled: true
    min_snr_db: 15.0
    max_snr_db: 40.0

  # --- tempo perturbation (applied before mel extraction) ---
  tempo:
    enabled: false          # slow; disabled by default, enable if budget allows
    min_rate: 0.9
    max_rate: 1.1

  # --- stem mixing (simulate mashup context) ---
  mix_stems:
    enabled: true
    mix_prob: 0.3           # prob of mixing in a random stem from another track
    alpha: 0.1              # min mixing coefficient
    beta: 0.4               # max mixing coefficient