inference:
  model_checkpoint: checkpoints_mix/best_multibranch_model.pth
  # model_checkpoint: checkpoints_finetune_mix_all_data/best_multibranch_model.pth
  label_encoder: checkpoints/label_encoder.pkl

  batch_size: 32
  num_workers: 4
  device: auto              # "auto" resolves cuda > mps > cpu

  test_csv: data/raw/messy_mashup/test.csv
  submission_path: submissions/submission.csv

  # TTA: test-time augmentation (average predictions over N augmented views)
  tta:
    enabled: false
    n_views: 5